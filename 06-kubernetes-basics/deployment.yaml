apiVersion: apps/v1
kind: Deployment
metadata:
  name: goapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: goapp
  template:
    metadata:
      labels:
        app: goapp
    spec:
      containers:
        - name: goapp
          image: ymarchuk/goapp:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

